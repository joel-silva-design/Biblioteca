<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
    <title>Login na Conta</title>
  </head>
  <body>
    <header>
      <h1>Biblioteca SdF</h1>
    </header>

    <main>
      <form id="login-form" class="card row g-3" novalidate>

        <h2 class="card-title mt-0">Faça login na sua conta</h2>

        <div class="col-12 mb-1 card-usuario">
          <label class="form-label" for="nome-usuario">Nome de Usuário:</label>
          <input class="form-control" type="text" id="nome-usuario" name="nome-usuario" required />
        </div>
        <div class="col-12 mb-1 card-usuario">
          <label class="form-label" for="senha-usuario">Senha:</label>
            <input
              class="form-control"
              type="password"
              id="senha-usuario"
              name="senha-usuario"
              placeholder="Digite sua senha"
              required
            />
        </div>
        <div class="col-12 d-flex justify-content-center mt-auto btns-container">
          <a href="cadastro.html" class="d-flex justify-content-center" id="btn-conectar">Criar Conta</a>
          <button type="submit" class="btn btn-primary btn-sm fw-bold" id="btn-login">Entrar</button>
        </div>
        <div class="col-12 text-center mt-2">
          <small class="mensagem"></small> 
        </div>
      </form>
    </main>
  </body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</html>
