<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Login na Conta</title>
</head>
<body>
    <header>
        <h1>Biblioteca SdF</h1>
    </header>

    <main>
        <form id="loginForm" novalidate>
            <h2>Faça login na sua conta</h2>
            <div class="card-usuario">
                <label for="nome-usuario">Nome de Usuário:</label>
                <input type="text" id="nome-usuario" name="nome-usuario" required>
            </div>
            <div class="card-usuario">
                <label for="senha-usuario">Senha:</label>
                <input type="password" id="senha-usuario" name="senha-usuario" placeholder="Digite sua senha" required>
            </div>
            <div class="btns-container">
                <a href="./cadastro.html"><button id="btn-conectar">Criar Conta</button></a>
                <a href="./index.html"><button type="submit" id="btn-login">Entrar</button></a>
                <small class="mensagem"></small>
            </div>
        </form>
    </main>
</body>
<script src="./script.js"></script>
</html>
